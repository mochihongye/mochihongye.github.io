<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>哈基米登录</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#fceef5;
            font-family:"微软雅黑";
            display:flex; align-items:center; justify-content:center;
            height:100vh;
        }
        .login-box {
            background:white;
            padding:40px; border-radius:20px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
            text-align:center;
            width:350px;
        }
        .login-box h2 {
            color:#ff7b9c; margin-bottom:20px;
        }
        input {
            width:100%; padding:12px; margin:10px 0;
            border:2px solid #eee; border-radius:10px;
            font-size:16px;
        }
        button {
            width:100%; padding:14px;
            background:#ff7b9c; color:white;
            border:none; border-radius:12px;
            font-size:18px; font-weight:bold;
            cursor:pointer;
            margin-top:10px;
        }
        button:hover { opacity:0.9; }
        .tip { margin-top:15px; color:#666; font-size:14px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>哈基米账号登录</h2>
    <input type="text" id="username" placeholder="输入用户名">
    <input type="password" id="pwd" placeholder="输入密码">
    <button onclick="login()">登录</button>
    <div class="tip">登录仅验证身份，不再赠送经验和小鱼干</div>
</div>

<script>
    // 读取本地数据（只读取，不自动加奖励）
    let fish = parseInt(localStorage.getItem('fish')) || 0;
    let exp = parseInt(localStorage.getItem('exp')) || 0;
    let level = parseInt(localStorage.getItem('level')) || 0;

    function login() {
        let user = document.getElementById('username').value.trim();
        let pwd = document.getElementById('pwd').value.trim();

        if (!user || !pwd) {
            alert('请输入用户名和密码');
            return;
        }

        // 登录成功：只保存用户名，不再给经验、小鱼干
        localStorage.setItem('user', user);
        // 不再执行：exp += 10; fish +=3; 这类代码

        alert('登录成功！');
        window.location.href = 'index-main.html'; // 跳转到主页
    }
</script>

</body>
</html>
