<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>哈基米相册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f5;
            padding: 20px;
        }

        /* 返回首页按钮 */
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #4ecdc4;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
        }

        .back-btn:hover {
            background: #38b0a9;
        }

        /* 相册标题 */
        h1 {
            text-align: center;
            font-size: 48px;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #8585f8, #f86b6b, #f37f92, #6868fa, #4af34a, #67fdf6);
            -webkit-background-clip: text;
            color: transparent;
        }

        /* 相册网格布局 */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 相册图片 */
        .album-item {
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .album-item:hover {
            transform: scale(1.05);
        }

        .album-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        /* 点击放大遮罩 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
        }

        .overlay.show {
            display: flex;
        }

        .overlay img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }

        /* 新增：切换按钮样式 */
        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 28px;
            cursor: pointer;
            z-index: 1000;
            display: none;
            transition: background 0.2s;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.4);
        }

        .nav-btn.prev {
            left: 30px;
        }

        .nav-btn.next {
            right: 30px;
        }

        .overlay.show ~ .nav-btn {
            display: block;
        }
    </style>
</head>

    <!-- 新增：切换按钮 -->
    <button class="nav-btn prev" id="prevBtn">←</button>
    <button class="nav-btn next" id="nextBtn">→</button>

    <script>
        // 点击图片放大 + 新增切换逻辑
        const overlay = document.getElementById('overlay');
        const bigImg = document.getElementById('bigImg');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const imgList = document.querySelectorAll('.album-item img'); // 相册图片列表
        let currentIndex = 0; // 当前显示的图片索引

        // 点击图片放大
        imgList.forEach((img, index) => {
            img.onclick = (e) => {
                e.stopPropagation(); // 阻止事件冒泡到overlay
                currentIndex = index;
                bigImg.src = img.src;
                overlay.classList.add('show');
            };
        });

        // 上一张
        function showPrevImg() {
            currentIndex = (currentIndex - 1 + imgList.length) % imgList.length;
            bigImg.src = imgList[currentIndex].src;
        }

        // 下一张
        function showNextImg() {
            currentIndex = (currentIndex + 1) % imgList.length;
            bigImg.src = imgList[currentIndex].src;
        }

        // 绑定切换按钮事件
        prevBtn.onclick = (e) => {
            e.stopPropagation();
            showPrevImg();
        };
        nextBtn.onclick = (e) => {
            e.stopPropagation();
            showNextImg();
        };

        // 键盘方向键切换 + ESC关闭
        document.addEventListener('keydown', (e) => {
            if (overlay.classList.contains('show')) {
                if (e.key === 'ArrowLeft') showPrevImg();
                if (e.key === 'ArrowRight') showNextImg();
                if (e.key === 'Escape') overlay.classList.remove('show');
            }
        });

        // 点击遮罩关闭
        overlay.onclick = () => {
            overlay.classList.remove('show');
        };
    </script>
