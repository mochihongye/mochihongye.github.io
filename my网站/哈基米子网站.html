<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哈基米相册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f5;
            padding: 20px;
        }

        /* 返回首页按钮 */
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #4ecdc4;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
        }

        .back-btn:hover {
            background: #38b0a9;
        }

        /* 相册标题 */
        h1 {
            text-align: center;
            font-size: 48px;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #8585f8, #f86b6b, #f37f92, #6868fa, #4af34a, #67fdf6);
            -webkit-background-clip: text;
            color: transparent;
        }

        /* 相册网格布局 */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 相册图片 */
        .album-item {
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .album-item:hover {
            transform: scale(1.05);
        }

        .album-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        /* 点击放大遮罩 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
        }

        .overlay.show {
            display: flex;
        }

        .overlay img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <!-- 返回首页按钮 -->
    <a href="哈基米.html" class="back-btn">← 返回首页</a>

    <!-- 相册标题 -->
    <h1>哈基米相册</h1>

    <!-- 相册网格 -->
    <div class="album-grid">
        <div class="album-item">
            <img src="0F5AB837298A815612BCF406427C2B61.jpg" alt="相册图片1">
        </div>
        <div class="album-item">
            <img src="5F8D44CB468F293156616AFC25B33EB5.jpg" alt="相册图片2">
        </div>
        <div class="album-item">
            <img src="6CA920FB8945D6AB436C130FF4AD7F83.jpg" alt="相册图片3">
        </div>
        <div class="album-item">
            <img src="574E778FA01383BF5E914334E5B77C1D.jpg" alt="相册图片4">
        </div>
        <div class="album-item">
            <img src="C0E59290E5616B653CED90A7E15B6326.jpg" alt="相册图片5">
        </div>
        <div class="album-item">
            <img src="0689B0C939E2E349DF715BC558DE8857.jpg" alt="相册图片6">
        </div>
        <!-- 继续加图片，复制上面的div即可 -->
    </div>

    <!-- 放大查看层 -->
    <div class="overlay" id="overlay">
        <img id="bigImg">
    </div>

    <script>
        // 点击图片放大
        const overlay = document.getElementById('overlay');
        const bigImg = document.getElementById('bigImg');

        document.querySelectorAll('.album-item img').forEach(img => {
            img.onclick = () => {
                bigImg.src = img.src;
                overlay.classList.add('show');
            };
        });

        // 点击遮罩关闭
        overlay.onclick = () => {
            overlay.classList.remove('show');
        };
    </script>
</body>
</html>
