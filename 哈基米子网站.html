<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哈基米相册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f5;
            padding: 20px;
            padding-bottom: 100px;
        }

        /* 右下角音乐播放器 - 上下垂直布局 */
        #musicWrap {
            position: fixed;
            right: 20px;
            bottom: 20px;
            z-index: 9999;
            background: rgba(0,0,0,0.85);
            border-radius: 15px;
            display: flex;
            flex-direction: column; /* 上下排列 */
            align-items: center;
            gap: 8px;
            padding: 15px 20px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.3);
        }
        /* 顶部醒目标题 */
        .music-title {
            font-size: 16px;
            font-weight: bold;
            color: #4ecdc4;
            white-space: nowrap;
        }
        /* 底部按钮组 - 横向排列 */
        .music-btns {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .music-btn {
            color: #fff;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
        }
        .music-btn:hover {
            color: #4ecdc4;
            transform: scale(1.1);
        }
        /* 隐藏原生音频 */
        #bgMusic {
            display: none;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #4ecdc4;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
        }
        .back-btn:hover {
            background: #38b0a9;
        }
        .album-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            text-align: center;
            font-size: 48px;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #8585f8, #f86b6b, #f37f92, #6868fa, #4af34a, #67fdf6);
            -webkit-background-clip: text;
            color: transparent;
        }

        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .album-item {
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .album-item:hover {
            transform: scale(1.05);
        }
        .album-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
        }
        .overlay.show {
            display: flex;
        }
        .overlay img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }

        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 28px;
            cursor: pointer;
            z-index: 1000;
            display: none;
        }
        .nav-btn.prev {left: 30px;}
        .nav-btn.next {right: 30px;}
        .overlay.show ~ .nav-btn {display: block;}
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← 返回首页</a>

    <h1>哈基米相册</h1>

    <div class="overlay" id="overlay">
        <img id="bigImg">
    </div>
    <button class="nav-btn prev" id="prevBtn">←</button>
    <button class="nav-btn next" id="nextBtn">→</button>

    <!-- 核心修改：上方文字 + 下方按钮 -->
    <div id="musicWrap">
        <span class="music-title">哈基米音乐播放器</span>
        <div class="music-btns">
            <button class="music-btn" id="prevMusic">⏮️</button>
            <button class="music-btn" id="playPause">▶️</button>
            <button class="music-btn" id="nextMusic">⏭️</button>
        </div>
    </div>

    <audio id="bgMusic" loop></audio>

    <script>
        // 相册放大功能
        const overlay = document.getElementById('overlay');
        const bigImg = document.getElementById('bigImg');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const imgList = document.querySelectorAll('.album-item img');
        let currentIndex = 0;

        imgList.forEach((img, index) => {
            img.onclick = (e) => {
                e.stopPropagation();
                currentIndex = index;
                bigImg.src = img.src;
                overlay.classList.add('show');
            };
        });
        function showPrevImg(){
            currentIndex = (currentIndex - 1 + imgList.length) % imgList.length;
            bigImg.src = imgList[currentIndex].src;
        }
        function showNextImg(){
            currentIndex = (currentIndex + 1) % imgList.length;
            bigImg.src = imgList[currentIndex].src;
        }
        prevBtn.onclick = e=>{e.stopPropagation();showPrevImg()};
        nextBtn.onclick = e=>{e.stopPropagation();showNextImg()};
        document.addEventListener('keydown',e=>{
            if(overlay.classList.contains('show')){
                if(e.key==='ArrowLeft')showPrevImg();
                if(e.key==='ArrowRight')showNextImg();
                if(e.key==='Escape')overlay.classList.remove('show');
            }
        });
        overlay.onclick = ()=>overlay.classList.remove('show');

        // 音乐播放/暂停/切歌功能
        const musicList = ["song1.mp3","song2.mp3","song3.mp3"];
        let musicIndex = 0;
        const audio = document.getElementById('bgMusic');
        const playPauseBtn = document.getElementById('playPause');
        let isPlaying = false;

        // 播放音乐
        function playMusic(){
            audio.src = musicList[musicIndex];
            audio.play().then(()=>{
                isPlaying = true;
                playPauseBtn.innerText = "⏸️";
            }).catch(err => {});
        }

        // 暂停音乐
        function pauseMusic(){
            audio.pause();
            isPlaying = false;
            playPauseBtn.innerText = "▶️";
        }

        // 播放/暂停切换
        playPauseBtn.onclick = () => {
            isPlaying ? pauseMusic() : playMusic();
        };

        // 上一首
        document.getElementById('prevMusic').onclick = () => {
            musicIndex = (musicIndex - 1 + musicList.length) % musicList.length;
            playMusic();
        };

        // 下一首
        document.getElementById('nextMusic').onclick = () => {
            musicIndex = (musicIndex + 1) % musicList.length;
            playMusic();
        };

        // 页面加载自动播放
        playMusic();
    </script>
</body>
